services:
  - type: web
    name: explainable-fake-review-detection
    env: python
    buildCommand: "pip install -r requirements.txt && python -m nltk.downloader punkt stopwords wordnet averaged_perceptron_tagger vader_lexicon punkt_tab"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
